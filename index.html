<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <title>Nicolas Crespo</title>
  </head>
  <body>
    <div class="center-container">
      <div id="msg">
        <h1>Nicolas Crespo</h1>
        <p>Computer Engineering @ UCLA</p>
        <p id="email-link"></p>
      </div>
    </div>
    <div class="socials">
      <a href="https://www.linkedin.com/in/n-crespo" target="_blank">
        <img
          class="social-icon"
          src="https://upload.wikimedia.org/wikipedia/commons/8/81/LinkedIn_icon.svg"
          alt="LinkedIn Logo"
          draggable="false"
        />
      </a>

      <a href="https://www.github.com/n-crespo" target="_blank">
        <img
          class="social-icon"
          src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/24/Github_logo_svg.svg/1280px-Github_logo_svg.svg.png"
          alt="Github Logo"
          draggable="false"
          style="
            background-color: transparent;
            border-radius: 50%;
            padding: 0px;
            border-color: transparent;
          "
        />
      </a>
    </div>

    <script>
      const u = "bmNyZXNwbw==";
      const d = "dWNsYS5lZHU=";
      const decode = (str) => atob(str);
      const email = decode(u) + "@" + decode(d);
      const el = document.getElementById("email-link");
      el.innerHTML = `<a href="mailto:${email}">${email}</a>`;
    </script>
  </body>
</html>
